services:
  postgres:
    image: postgres:16
    container_name: easyetfsat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easyetfsat
      POSTGRES_USER: easyetfsat
      POSTGRES_PASSWORD: easyetfsat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyetfsat -d easyetfsat"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

